services:

  mysql:
    image: mysql:8
    container_name: mysql-container
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: orsproject10
    ports:
      - "3307:3306"

  backend:
    build: .
    container_name: backend-container
    ports:
      - "8080:8080"
    depends_on:
      - mysql

  frontend:
    build: ../frontend
    container_name: frontend-container
    ports:
      - "4200:80"
    depends_on:
      - backend